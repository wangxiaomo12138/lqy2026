# =============================================================================
# Tunable Target 配置规范
# 用途：向 Tune Engine 注册一个「可被自动循环调优」的对象
# 文件可存 YAML/JSON，入库后由 target_registry 表管理
# =============================================================================

# -----------------------------------------------------------------------------
# 空模板（复制后填写，注册新技能时用）
# -----------------------------------------------------------------------------
template:
  target_id: ""                    # 必填，全局唯一，如 invoice-parse
  name: ""                         # 展示名
  description: ""                  # 说明这个能力是做什么的
  type: ""                         # workflow | agent | skill | composite
  entry_ref: ""                    # 当前入口版本，如 wf_xxx@v1

  benchmark_suite_id: ""           # 测试集 ID
  evaluator_id: ""                 # 评估器 ID

  patchable_components: []         # 允许自动修改的组件类型
  # 可选值: workflow | agent | skill | mcp | api | planner

  success_criteria: {}             # 达标条件（全部满足即 optimal）
  # 示例:
  #   min_pass_rate: 0.90
  #   min_field_f1: 0.88
  #   max_p95_latency_ms: 8000

  constraints: {}                  # 循环约束
  # 示例:
  #   max_tune_iters: 8
  #   max_cost_tokens: 200000
  #   max_wall_time_sec: 3600
  #   single_knob_per_iter: true   # 每轮只改一个配置项（强烈建议 true）
  #   stagnation_window: 3         # 连续 N 轮提升 < min_delta 则停止
  #   min_delta: 0.02              # 最小有效提升（2%）

  input_schema: {}                 # 可选，调优时传入的默认参数 schema
  output_schema: {}                # 可选，期望输出结构（供 evaluator 使用）

  metadata: {}                     # 扩展字段：负责人、业务线、标签等

  enabled: true
  version: 1                       # 配置本身版本，改配置时递增


# -----------------------------------------------------------------------------
# 示例 1：合同解析（workflow 类型，填好的可参考实例）
# -----------------------------------------------------------------------------
examples:
  contract-parse:
    target_id: contract-parse
    name: 合同解析
    description: 从合同文本/文件中抽取结构化字段并输出 JSON
    type: workflow
    entry_ref: wf_contract_parse@v3

    benchmark_suite_id: contract_bench_v1
    evaluator_id: contract_field_eval

    patchable_components:
      - workflow
      - skill
      - agent
      - mcp

    success_criteria:
      min_pass_rate: 0.90          # 样本通过率 >= 90%
      min_field_f1: 0.88             # 字段级 F1 >= 0.88
      max_error_rate: 0.05           # 严重错误率 <= 5%
      max_p95_latency_ms: 12000      # P95 时延 <= 12s

    constraints:
      max_tune_iters: 8
      max_cost_tokens: 300000
      max_wall_time_sec: 7200
      single_knob_per_iter: true
      stagnation_window: 3
      min_delta: 0.02

    input_schema:
      type: object
      properties:
        file_url:
          type: string
          description: 合同文件地址
        extract_fields:
          type: array
          items:
            type: string
          description: 需要抽取的字段列表
      required:
        - file_url

    output_schema:
      type: object
      properties:
        party_a: { type: string }
        party_b: { type: string }
        amount: { type: number }
        sign_date: { type: string, format: date }
        payment_terms: { type: string }
        penalty_clause: { type: string }

    metadata:
      owner: legal-ai-team
      tags: [contract, extraction, nlp]
      priority: high

    enabled: true
    version: 1


  # ---------------------------------------------------------------------------
  # 示例 2：发票识别（展示「新技能只要复制改字段」）
  # ---------------------------------------------------------------------------
  invoice-parse:
    target_id: invoice-parse
    name: 发票识别
    description: 从发票图片/PDF 提取金额、税号、开票日期等
    type: workflow
    entry_ref: wf_invoice_parse@v1

    benchmark_suite_id: invoice_bench_v1
    evaluator_id: invoice_field_eval

    patchable_components:
      - workflow
      - skill
      - agent

    success_criteria:
      min_pass_rate: 0.95
      min_field_f1: 0.92

    constraints:
      max_tune_iters: 6
      max_cost_tokens: 150000
      single_knob_per_iter: true
      stagnation_window: 2
      min_delta: 0.01

    enabled: true
    version: 1
